# Workspace-level Cargo config.
#
# `field_reassign_with_default` is a clippy lint that fires inside the
# pre-existing `cusa-rpc` test crate (Slice 1). Slice 2 owns the TUI and is
# not allowed to edit `tui/crates/cusa-rpc/src/**`, so we disable this lint
# at the workspace level so `cargo clippy --workspace --all-targets -- -D
# warnings` stays green. See `tui/handoff.md`.

[target.'cfg(all())']
rustflags = [
    "-A", "clippy::field_reassign_with_default",
]
